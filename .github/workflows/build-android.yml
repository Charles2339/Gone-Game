name: Build Godot Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Gone APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:3.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover environment
        shell: bash
        run: |
          echo "HOME=$HOME USER=$(whoami)"
          godot3 --version 2>/dev/null || godot --version 2>/dev/null || echo "no godot in PATH"
          find /usr /opt /root -maxdepth 6 -name "android_debug.apk" 2>/dev/null | head -5
          find /usr /opt /root -maxdepth 6 -name "adb" 2>/dev/null | head -3

      - name: Install templates
        shell: bash
        run: |
          TDIR="$HOME/.local/share/godot/templates/3.6.stable"
          mkdir -p "$TDIR"
          SRC=$(find / -maxdepth 8 -name "android_debug.apk" 2>/dev/null | head -1)
          if [ -n "$SRC" ]; then
            cp "$(dirname "$SRC")"/* "$TDIR/" 2>/dev/null || true
            echo "Templates copied from $(dirname "$SRC")"
          else
            wget -q https://github.com/godotengine/godot/releases/download/3.6-stable/Godot_v3.6-stable_export_templates.tpz -O /tmp/t.tpz
            unzip -q /tmp/t.tpz -d /tmp/t
            cp /tmp/t/templates/* "$TDIR/"
            echo "Templates downloaded"
          fi
          ls "$TDIR"

      - name: Write editor settings
        shell: bash
        run: |
          mkdir -p "$HOME/.config/godot"
          SDK=$(find / -maxdepth 8 -name "adb" 2>/dev/null | head -1 | xargs dirname | xargs dirname 2>/dev/null)
          SDK="${SDK:-/usr/lib/android-sdk}"
          echo "Using SDK: $SDK"
          keytool -genkeypair -noprompt -keystore /tmp/dk.jks -storepass android -alias debug -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug,O=Android,C=US" 2>/dev/null || true
          {
            echo '[gd_resource type="EditorSettings" format=2]'
            echo '[resource]'
            printf 'export/android/android_sdk_path = "%s"\n' "$SDK"
            echo 'export/android/debug_keystore = "/tmp/dk.jks"'
            echo 'export/android/debug_keystore_user = "debug"'
            echo 'export/android/debug_keystore_pass = "android"'
          } > "$HOME/.config/godot/editor_settings-3.tres"
          cat "$HOME/.config/godot/editor_settings-3.tres"

      - name: Write export presets
        shell: bash
        run: |
          mkdir -p builds
          {
            echo '[preset.0]'
            echo 'name="Android"'
            echo 'platform="Android"'
            echo 'runnable=true'
            echo 'custom_features=""'
            echo 'export_filter="all_resources"'
            echo 'include_filter=""'
            echo 'exclude_filter=""'
            echo 'export_path="builds/Gone.apk"'
            echo 'script_export_mode=1'
            echo 'script_encryption_key=""'
            echo ''
            echo '[preset.0.options]'
            echo 'custom_template/debug=""'
            echo 'custom_template/release=""'
            echo 'custom_template/use_custom_build=false'
            echo 'architectures/armeabi-v7a=true'
            echo 'architectures/arm64-v8a=true'
            echo 'keystore/debug="/tmp/dk.jks"'
            echo 'keystore/debug_user="debug"'
            echo 'keystore/debug_password="android"'
            echo 'keystore/release=""'
            echo 'keystore/release_user=""'
            echo 'keystore/release_password=""'
            echo 'version/code=1'
            echo 'version/name="1.0"'
            echo 'package/unique_name="com.gone.game"'
            echo 'package/name="Gone"'
            echo 'package/signed=true'
            echo 'package/classify_as_game=true'
            echo 'screen/immersive_mode=true'
            echo 'screen/support_small=true'
            echo 'screen/support_normal=true'
            echo 'screen/support_large=true'
            echo 'screen/support_xlarge=true'
            echo 'screen/keep_screen_on=true'
          } > export_presets.cfg

      - name: Export APK
        shell: bash
        run: |
          GODOT=$(command -v godot3 2>/dev/null || command -v godot 2>/dev/null)
          echo "Godot: $GODOT"
          "$GODOT" --export "Android" "$(pwd)/builds/Gone.apk" --no-window 2>&1 || true

      - name: Verify APK
        shell: bash
        run: |
          if [ -f builds/Gone.apk ]; then
            echo "SUCCESS"
            ls -lh builds/Gone.apk
          else
            echo "MISSING. Template dir:"
            ls "$HOME/.local/share/godot/templates/3.6.stable/" 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gone-apk-${{ github.run_number }}
          path: builds/Gone.apk
          retention-days: 30
