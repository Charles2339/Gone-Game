name: Build Godot Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GODOT_VERSION: "3.6"
  EXPORT_NAME: "Gone"
  HOME: /root

jobs:
  build:
    name: Build Gone APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:3.6
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up template directory
        run: |
          export TEMPLATES_DIR="/root/.local/share/godot/templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          mkdir -p /root/.config/godot

          # The barichello/godot-ci image ships templates at /root/templates/
          # Copy them to where Godot expects them
          if [ -d "/root/templates" ]; then
            echo "Found bundled templates at /root/templates"
            cp /root/templates/*.apk "$TEMPLATES_DIR/" 2>/dev/null || true
            cp /root/templates/*.zip "$TEMPLATES_DIR/" 2>/dev/null || true
            ls -la /root/templates/ | head -20
            echo "Copied to: $TEMPLATES_DIR"
            ls -la "$TEMPLATES_DIR" | head -20
          else
            echo "No bundled templates — downloading from GitHub releases..."
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" \
              -O /tmp/templates.tpz
            unzip -q /tmp/templates.tpz -d /tmp/tpl_extracted
            cp /tmp/tpl_extracted/templates/* "$TEMPLATES_DIR/"
            echo "Downloaded templates installed."
          fi

          ls -la "$TEMPLATES_DIR"

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore /root/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true
          echo "Keystore created at /root/debug.keystore"

      - name: Write Godot editor settings
        run: |
          ANDROID_SDK_PATH="/usr/lib/android-sdk"
          # Try to locate the Android SDK bundled in the container
          for candidate in /usr/lib/android-sdk /opt/android-sdk /root/android-sdk; do
            if [ -d "$candidate" ]; then
              ANDROID_SDK_PATH="$candidate"
              break
            fi
          done
          echo "Using Android SDK: $ANDROID_SDK_PATH"

          cat > /root/.config/godot/editor_settings-3.tres << EOF
[gd_resource type="EditorSettings" format=2]

[resource]
export/android/android_sdk_path = "$ANDROID_SDK_PATH"
export/android/debug_keystore = "/root/debug.keystore"
export/android/debug_keystore_user = "androiddebugkey"
export/android/debug_keystore_pass = "android"
export/android/adb = "$ANDROID_SDK_PATH/platform-tools/adb"
export/android/jarsigner = "/usr/bin/jarsigner"
EOF
          cat /root/.config/godot/editor_settings-3.tres

      - name: Write export presets
        run: |
          cat > export_presets.cfg << 'EOF'
[preset.0]

name="Android"
platform="Android"
runnable=true
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="builds/Gone.apk"
script_export_mode=1
script_encryption_key=""

[preset.0.options]

custom_template/debug=""
custom_template/release=""
custom_template/use_custom_build=false
custom_template/export_format=0
architectures/armeabi-v7a=true
architectures/arm64-v8a=true
architectures/x86=false
architectures/x86_64=false
keystore/debug="/root/debug.keystore"
keystore/debug_user="androiddebugkey"
keystore/debug_password="android"
keystore/release=""
keystore/release_user=""
keystore/release_password=""
version/code=1
version/name="1.0"
package/unique_name="com.gone.game"
package/name="Gone"
package/signed=true
package/classify_as_game=true
screen/immersive_mode=true
screen/support_small=true
screen/support_normal=true
screen/support_large=true
screen/support_xlarge=true
screen/keep_screen_on=true
EOF

      - name: Create builds dir and verify project
        run: |
          mkdir -p builds
          echo "Project files:"
          ls -la
          echo "Scenes:"
          ls -la scenes/
          echo "Scripts:"
          ls -la scripts/

      - name: Export APK
        run: |
          # Run headless export — errors about VisualServer RID are harmless in headless mode
          godot3 --export "Android" builds/Gone.apk --no-window 2>&1 || \
          godot --export "Android" builds/Gone.apk --no-window 2>&1
          echo "Export finished with exit code: $?"

      - name: Verify and report APK
        run: |
          if [ -f builds/Gone.apk ]; then
            echo "✅ APK built successfully!"
            ls -lh builds/Gone.apk
          else
            echo "❌ APK not found. Directory contents:"
            ls -la builds/ || echo "builds/ is empty"
            echo "Template dir contents:"
            ls -la "/root/.local/share/godot/templates/${GODOT_VERSION}.stable/" || true
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: gone-apk-${{ github.run_number }}
          path: builds/Gone.apk
          retention-days: 30

      - name: Upload APK (even on failure for debugging)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: gone-debug-logs-${{ github.run_number }}
          path: |
            builds/
          retention-days: 7
