name: Build Godot Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Gone APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:3.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        shell: bash
        run: |
          TDIR="$HOME/.local/share/godot/templates/3.6.stable"
          mkdir -p "$TDIR"
          SRC=$(find / -maxdepth 8 -name "android_debug.apk" 2>/dev/null | head -1)
          if [ -n "$SRC" ]; then
            cp "$(dirname "$SRC")"/* "$TDIR/" 2>/dev/null || true
            echo "Templates copied from $(dirname "$SRC")"
          else
            echo "Downloading templates..."
            wget -q https://github.com/godotengine/godot/releases/download/3.6-stable/Godot_v3.6-stable_export_templates.tpz -O /tmp/t.tpz
            cd /tmp && jar xf /tmp/t.tpz
            cp /tmp/templates/* "$TDIR/"
            echo "Templates downloaded"
          fi
          ls "$TDIR"

      - name: Setup keystore and editor settings
        shell: bash
        run: |
          keytool -genkeypair -noprompt \
            -keystore /tmp/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          SDK=$(find /usr /opt /root -maxdepth 8 -name "adb" 2>/dev/null | head -1 | xargs -I{} dirname {} | xargs -I{} dirname {} 2>/dev/null || echo "/usr/lib/android-sdk")
          echo "Using Android SDK: $SDK"

          mkdir -p "$HOME/.config/godot"
          printf '[gd_resource type="EditorSettings" format=2]\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "/tmp/debug.keystore"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' "$SDK" > "$HOME/.config/godot/editor_settings-3.tres"
          cat "$HOME/.config/godot/editor_settings-3.tres"

      - name: Write export presets
        shell: bash
        run: |
          mkdir -p builds
          printf '[preset.0]\nname="Android"\nplatform="Android"\nrunnable=true\ncustom_features=""\nexport_filter="all_resources"\ninclude_filter=""\nexclude_filter=""\nexport_path="builds/Gone.apk"\nscript_export_mode=1\nscript_encryption_key=""\n\n[preset.0.options]\ncustom_template/debug=""\ncustom_template/release=""\ncustom_template/use_custom_build=false\narchitectures/armeabi-v7a=true\narchitectures/arm64-v8a=true\nkeystore/debug="/tmp/debug.keystore"\nkeystore/debug_user="androiddebugkey"\nkeystore/debug_password="android"\nkeystore/release=""\nkeystore/release_user=""\nkeystore/release_password=""\nversion/code=1\nversion/name="1.0"\npackage/unique_name="com.gone.game"\npackage/name="Gone"\npackage/signed=true\npackage/classify_as_game=true\nscreen/immersive_mode=true\nscreen/support_small=true\nscreen/support_normal=true\nscreen/support_large=true\nscreen/support_xlarge=true\nscreen/keep_screen_on=true\n' > export_presets.cfg
          cat export_presets.cfg

      - name: Export APK
        shell: bash
        run: |
          GODOT=$(command -v godot3 2>/dev/null || command -v godot 2>/dev/null)
          echo "Godot binary: $GODOT"
          # Godot headless always exits 1 even on success - APK validity is checked in Verify step
          "$GODOT" --path "$(pwd)" --no-window --export-debug "Android" "$(pwd)/builds/Gone.apk" || true

      - name: Verify APK
        shell: bash
        run: |
          if [ ! -f builds/Gone.apk ]; then
            echo "ERROR: APK not produced"
            exit 1
          fi
          SIZE=$(stat -c%s builds/Gone.apk)
          echo "APK size: $SIZE bytes"
          if [ "$SIZE" -lt 100000 ]; then
            echo "ERROR: APK too small ($SIZE bytes) - likely corrupt"
            ls -lh builds/
            exit 1
          fi
          MAGIC=$(od -A n -N 4 -t x1 builds/Gone.apk | tr -d ' \n')
          echo "Magic bytes: $MAGIC"
          if [ "$MAGIC" != "504b0304" ]; then
            echo "ERROR: Not a valid APK/ZIP (expected 504b0304)"
            od -A n -N 16 -t x1 builds/Gone.apk
            exit 1
          fi
          echo "SUCCESS - Valid APK: $(ls -lh builds/Gone.apk | awk '{print $5}')"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gone-apk-${{ github.run_number }}
          path: builds/Gone.apk
          retention-days: 30
