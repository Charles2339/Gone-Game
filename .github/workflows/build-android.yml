name: Build Godot Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Gone APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:3.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Android SDK
        run: |
          apt-get update -qq && apt-get install -y -qq wget unzip openjdk-11-jdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          mkdir -p /opt/android-sdk/cmdline-tools
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extracted
          mv /tmp/cmdline-tools-extracted/cmdline-tools /opt/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses > /dev/null 2>&1 || true
          sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-29" "build-tools;29.0.3" "ndk;21.4.7075529"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/29.0.3" >> $GITHUB_ENV

      - name: Configure Godot Android export
        run: |
          mkdir -p ~/.config/godot
          mkdir -p ~/.local/share/godot/export_templates/3.6.stable
          cat > ~/.config/godot/editor_settings-3.tres << 'EOF'
          [gd_resource type="EditorSettings" format=2]
          [resource]
          export/android/android_sdk_path = "/opt/android-sdk"
          export/android/debug_keystore = ""
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Download Godot export templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/3.6-stable/Godot_v3.6-stable_export_templates.tpz -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates_extracted
          mv /tmp/templates_extracted/templates/* ~/.local/share/godot/export_templates/3.6.stable/
          echo "Export templates installed"

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
          echo "KEYSTORE_PATH=/tmp/debug.keystore" >> $GITHUB_ENV

      - name: Update editor settings with keystore
        run: |
          cat > ~/.config/godot/editor_settings-3.tres << EOF
          [gd_resource type="EditorSettings" format=2]
          [resource]
          export/android/android_sdk_path = "/opt/android-sdk"
          export/android/debug_keystore = "/tmp/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Create export presets
        run: |
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="builds/Gone.apk"
          script_export_mode=1
          script_encryption_key=""

          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          custom_template/use_custom_build=false
          custom_template/export_format=0
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          keystore/debug="/tmp/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          one_click_deploy/clear_previous_install=false
          version/code=1
          version/name="1.0"
          package/unique_name="com.gone.game"
          package/name="Gone"
          package/signed=true
          package/classify_as_game=true
          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          xr_features/degrees_of_freedom=0
          xr_features/hand_tracking=0
          xr_features/hand_tracking_frequency=0
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          screen/keep_screen_on=true
          activity/enable_pandemi=false
          activity/exclude_from_recents=false
          user_data_backup/allow=false
          command_line/extra_args=""
          apk_expansion/enable=false
          apk_expansion/SALT=""
          apk_expansion/public_key=""
          permissions/custom_permissions=PackedStringArray(  )
          permissions/access_checkin_properties=false
          permissions/access_coarse_location=false
          permissions/access_fine_location=false
          permissions/access_location_extra_commands=false
          permissions/access_mock_location=false
          permissions/access_network_state=false
          permissions/access_surface_flinger=false
          permissions/access_wifi_state=false
          permissions/account_manager=false
          permissions/add_voicemail=false
          permissions/authenticate_accounts=false
          permissions/battery_stats=false
          permissions/bind_accessibility_service=false
          permissions/bind_appwidget=false
          permissions/bind_device_admin=false
          permissions/bind_input_method=false
          permissions/bind_nfc_service=false
          permissions/bind_notification_listener_service=false
          permissions/bind_print_service=false
          permissions/bind_remoteviews=false
          permissions/bind_text_service=false
          permissions/bind_vpn_service=false
          permissions/bind_wallpaper=false
          permissions/bluetooth=false
          permissions/bluetooth_admin=false
          permissions/broadcast_package_removed=false
          permissions/broadcast_sms=false
          permissions/broadcast_sticky=false
          permissions/broadcast_wap_push=false
          permissions/call_phone=false
          permissions/call_privileged=false
          permissions/camera=false
          permissions/capture_audio_output=false
          permissions/capture_secure_video_output=false
          permissions/capture_video_output=false
          permissions/change_component_enabled_state=false
          permissions/change_configuration=false
          permissions/change_network_state=false
          permissions/change_wifi_multicast_state=false
          permissions/change_wifi_state=false
          permissions/clear_app_cache=false
          permissions/clear_app_user_data=false
          permissions/control_location_updates=false
          permissions/delete_cache_files=false
          permissions/delete_packages=false
          permissions/device_power=false
          permissions/diagnostic=false
          permissions/disable_keyguard=false
          permissions/dump=false
          permissions/expand_status_bar=false
          permissions/factory_test=false
          permissions/flashlight=false
          permissions/force_back=false
          permissions/get_accounts=false
          permissions/get_package_size=false
          permissions/get_tasks=false
          permissions/get_top_activity_info=false
          permissions/global_search=false
          permissions/hardware_test=false
          permissions/inject_events=false
          permissions/install_location_provider=false
          permissions/install_packages=false
          permissions/install_shortcut=false
          permissions/internal_system_window=false
          permissions/internet=false
          permissions/kill_background_processes=false
          permissions/location_hardware=false
          permissions/manage_accounts=false
          permissions/manage_app_tokens=false
          permissions/manage_documents=false
          permissions/master_clear=false
          permissions/media_content_control=false
          permissions/modify_audio_settings=false
          permissions/modify_phone_state=false
          permissions/mount_format_filesystems=false
          permissions/mount_unmount_filesystems=false
          permissions/nfc=false
          permissions/package_usage_stats=false
          permissions/persistent_activity=false
          permissions/process_outgoing_calls=false
          permissions/read_calendar=false
          permissions/read_call_log=false
          permissions/read_contacts=false
          permissions/read_external_storage=false
          permissions/read_frame_buffer=false
          permissions/read_history_bookmarks=false
          permissions/read_input_state=false
          permissions/read_logs=false
          permissions/read_phone_state=false
          permissions/read_profile=false
          permissions/read_sms=false
          permissions/read_social_stream=false
          permissions/read_sync_settings=false
          permissions/read_sync_stats=false
          permissions/read_user_dictionary=false
          permissions/reboot=false
          permissions/receive_boot_completed=false
          permissions/receive_mms=false
          permissions/receive_sms=false
          permissions/receive_wap_push=false
          permissions/record_audio=false
          permissions/reorder_tasks=false
          permissions/restart_packages=false
          permissions/send_respond_via_message=false
          permissions/send_sms=false
          permissions/set_activity_watcher=false
          permissions/set_alarm=false
          permissions/set_always_finish=false
          permissions/set_animation_scale=false
          permissions/set_debug_app=false
          permissions/set_orientation=false
          permissions/set_pointer_speed=false
          permissions/set_preferred_applications=false
          permissions/set_process_limit=false
          permissions/set_time=false
          permissions/set_time_zone=false
          permissions/set_wallpaper=false
          permissions/set_wallpaper_hints=false
          permissions/signal_persistent_processes=false
          permissions/status_bar=false
          permissions/subscribed_feeds_read=false
          permissions/subscribed_feeds_write=false
          permissions/system_alert_window=false
          permissions/transmit_ir=false
          permissions/uninstall_shortcut=false
          permissions/update_device_stats=false
          permissions/use_credentials=false
          permissions/use_sip=false
          permissions/vibrate=false
          permissions/wake_lock=false
          permissions/write_apn_settings=false
          permissions/write_calendar=false
          permissions/write_call_log=false
          permissions/write_contacts=false
          permissions/write_external_storage=false
          permissions/write_gservices=false
          permissions/write_history_bookmarks=false
          permissions/write_profile=false
          permissions/write_secure_settings=false
          permissions/write_settings=false
          permissions/write_sms=false
          permissions/write_social_stream=false
          permissions/write_sync_settings=false
          permissions/write_user_dictionary=false
          EOF

      - name: Create builds directory
        run: mkdir -p builds

      - name: Export APK
        run: |
          godot --export "Android" builds/Gone.apk --no-window 2>&1
          echo "Export exit code: $?"

      - name: Check build output
        run: |
          if [ -f builds/Gone.apk ]; then
            echo "✅ APK built successfully!"
            ls -lh builds/Gone.apk
          else
            echo "❌ APK not found — listing builds dir:"
            ls -la builds/ || true
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gone-apk-${{ github.run_number }}
          path: builds/Gone.apk
          retention-days: 30
