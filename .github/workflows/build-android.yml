name: Build Godot Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Gone APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:3.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover container environment
        run: |
          echo "HOME=$HOME"
          echo "USER=$(whoami)"
          godot3 --version 2>/dev/null || godot --version 2>/dev/null || echo "godot not found in PATH"
          find /usr/local/bin /usr/bin -name "godot*" 2>/dev/null
          find / -maxdepth 6 -name "android_debug.apk" 2>/dev/null | head -5
          echo "--- /root ---"
          ls /root/ 2>/dev/null || true
          echo "--- /usr/local/lib ---"
          ls /usr/local/lib/ 2>/dev/null | head -20 || true

      - name: Setup export templates
        run: |
          TDIR="$HOME/.local/share/godot/templates/3.6.stable"
          mkdir -p "$TDIR"
          SRC=$(find / -maxdepth 8 -name "android_debug.apk" 2>/dev/null | head -1)
          if [ -n "$SRC" ]; then
            cp "$(dirname $SRC)"/* "$TDIR/" 2>/dev/null || true
            echo "Copied from $SRC"
          else
            echo "Downloading templates..."
            wget -q https://github.com/godotengine/godot/releases/download/3.6-stable/Godot_v3.6-stable_export_templates.tpz -O /tmp/t.tpz
            unzip -q /tmp/t.tpz -d /tmp/t
            cp /tmp/t/templates/* "$TDIR/"
          fi
          ls "$TDIR"

      - name: Setup keystore and editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          keytool -genkeypair -noprompt \
            -keystore /tmp/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Debug,O=Android,C=US" 2>/dev/null
          SDK=$(find / -maxdepth 8 -name "adb" 2>/dev/null | head -1 | xargs dirname | xargs dirname 2>/dev/null || echo "/usr/lib/android-sdk")
          echo "SDK=$SDK"
          printf '[gd_resource type="EditorSettings" format=2]\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "/tmp/debug.keystore"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' "$SDK" > "$HOME/.config/godot/editor_settings-3.tres"
          cat "$HOME/.config/godot/editor_settings-3.tres"

      - name: Write export presets
        run: |
          mkdir -p builds
          cat > export_presets.cfg << 'EOF'
[preset.0]
name="Android"
platform="Android"
runnable=true
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="builds/Gone.apk"
script_export_mode=1
script_encryption_key=""

[preset.0.options]
custom_template/debug=""
custom_template/release=""
custom_template/use_custom_build=false
architectures/armeabi-v7a=true
architectures/arm64-v8a=true
keystore/debug="/tmp/debug.keystore"
keystore/debug_user="androiddebugkey"
keystore/debug_password="android"
keystore/release=""
keystore/release_user=""
keystore/release_password=""
version/code=1
version/name="1.0"
package/unique_name="com.gone.game"
package/name="Gone"
package/signed=true
package/classify_as_game=true
screen/immersive_mode=true
screen/support_small=true
screen/support_normal=true
screen/support_large=true
screen/support_xlarge=true
screen/keep_screen_on=true
EOF

      - name: Export APK
        run: |
          GODOT=$(which godot3 2>/dev/null || which godot 2>/dev/null)
          echo "Godot binary: $GODOT"
          $GODOT --export "Android" "$(pwd)/builds/Gone.apk" --no-window 2>&1 || true
          echo "Exit: $?"

      - name: Verify APK
        run: |
          if [ -f builds/Gone.apk ]; then
            echo "APK built successfully!"
            ls -lh builds/Gone.apk
          else
            echo "APK not found. Template dir:"
            ls "$HOME/.local/share/godot/templates/3.6.stable/" 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gone-apk-${{ github.run_number }}
          path: builds/Gone.apk
          retention-days: 30
