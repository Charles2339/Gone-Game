name: Build Godot Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Gone APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:3.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover environment
        shell: bash
        run: |
          echo "HOME=$HOME USER=$(whoami)"
          godot3 --version 2>/dev/null || godot --version 2>/dev/null || echo "no godot in PATH"
          find /usr /opt /root -maxdepth 6 -name "android_debug.apk" 2>/dev/null | head -5
          find /usr /opt /root -maxdepth 6 -name "adb" 2>/dev/null | head -3

      - name: Setup export templates
        shell: bash
        run: |
          TDIR="$HOME/.local/share/godot/templates/3.6.stable"
          mkdir -p "$TDIR"
          # barichello/godot-ci already ships templates — copy from image location
          SRC=$(find / -maxdepth 8 -name "android_debug.apk" 2>/dev/null | head -1)
          if [ -n "$SRC" ]; then
            cp "$(dirname "$SRC")"/* "$TDIR/" 2>/dev/null || true
            echo "Templates copied from $(dirname "$SRC")"
          else
            echo "Templates not found in image — downloading..."
            wget -q https://github.com/godotengine/godot/releases/download/3.6-stable/Godot_v3.6-stable_export_templates.tpz \
              -O /tmp/t.tpz
            unzip -q /tmp/t.tpz -d /tmp/t
            cp /tmp/t/templates/* "$TDIR/"
            echo "Templates downloaded"
          fi
          ls "$TDIR"

      - name: Setup keystore and editor settings
        shell: bash
        run: |
          # Generate a debug keystore (alias must match Godot's default: androiddebugkey)
          keytool -genkeypair -noprompt \
            -keystore /tmp/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          # Locate Android SDK
          SDK=$(find /usr /opt /root -maxdepth 8 -name "adb" 2>/dev/null | head -1 \
            | xargs dirname | xargs dirname 2>/dev/null)
          SDK="${SDK:-/usr/lib/android-sdk}"
          echo "Using Android SDK: $SDK"

          # Write editor settings
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-3.tres" << EOF
[gd_resource type="EditorSettings" format=2]
[resource]
export/android/android_sdk_path = "$SDK"
export/android/debug_keystore = "/tmp/debug.keystore"
export/android/debug_keystore_user = "androiddebugkey"
export/android/debug_keystore_pass = "android"
EOF
          cat "$HOME/.config/godot/editor_settings-3.tres"

      - name: Write export presets
        shell: bash
        run: |
          mkdir -p builds
          cat > export_presets.cfg << 'EOF'
[preset.0]
name="Android"
platform="Android"
runnable=true
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="builds/Gone.apk"
script_export_mode=1
script_encryption_key=""

[preset.0.options]
custom_template/debug=""
custom_template/release=""
custom_template/use_custom_build=false
architectures/armeabi-v7a=true
architectures/arm64-v8a=true
keystore/debug="/tmp/debug.keystore"
keystore/debug_user="androiddebugkey"
keystore/debug_password="android"
keystore/release=""
keystore/release_user=""
keystore/release_password=""
version/code=1
version/name="1.0"
package/unique_name="com.gone.game"
package/name="Gone"
package/signed=true
package/classify_as_game=true
screen/immersive_mode=true
screen/support_small=true
screen/support_normal=true
screen/support_large=true
screen/support_xlarge=true
screen/keep_screen_on=true
EOF
          cat export_presets.cfg

      - name: Export APK
        shell: bash
        run: |
          GODOT=$(command -v godot3 2>/dev/null || command -v godot 2>/dev/null)
          echo "Godot binary: $GODOT"
          # --no-window MUST come before --export; --path points Godot at the project root
          "$GODOT" --path "$(pwd)" --no-window --export "Android" "$(pwd)/builds/Gone.apk"

      - name: Verify APK
        shell: bash
        run: |
          if [ ! -f builds/Gone.apk ]; then
            echo "ERROR: APK not produced — export step must have failed silently."
            exit 1
          fi
          SIZE=$(stat -c%s builds/Gone.apk)
          echo "APK file size: $SIZE bytes"
          if [ "$SIZE" -lt 100000 ]; then
            echo "ERROR: APK is suspiciously small ($SIZE bytes) — likely corrupt or an error dump."
            exit 1
          fi
          # APKs are ZIP files; magic bytes are 50 4B 03 04
          MAGIC=$(xxd -l 4 builds/Gone.apk | awk '{print $2$3}')
          if [ "$MAGIC" != "504b0304" ]; then
            echo "ERROR: APK header invalid (got $MAGIC, want 504b0304)."
            echo "First 64 bytes of file:"
            xxd -l 64 builds/Gone.apk
            exit 1
          fi
          echo "SUCCESS — APK looks valid: $(ls -lh builds/Gone.apk | awk '{print $5}')"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gone-apk-${{ github.run_number }}
          path: builds/Gone.apk
          retention-days: 30
