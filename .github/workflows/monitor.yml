name: Build Status Monitor

on:
  workflow_run:
    workflows: ["Build Godot Android APK"]
    types: [completed]

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Report build result
        run: |
          echo "================================="
          echo "Build workflow completed"
          echo "Status: ${{ github.event.workflow_run.conclusion }}"
          echo "Run #${{ github.event.workflow_run.run_number }}"
          echo "Triggered by: ${{ github.event.workflow_run.triggering_actor.login }}"
          echo "================================="
          if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "✅ APK is ready!"
            echo "Download from: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
          else
            echo "❌ Build failed. Check logs at:"
            echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
          fi
